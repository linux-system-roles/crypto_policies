---
- name: Ensure that the role runs with default parameters
  hosts: all
  tasks:
    - name: See if /dev/log exists for the fingerprint check
      ansible.builtin.stat:
        path: /dev/log
      register: __register_dev_log

    - name: Set the start time for the journal search
      ansible.builtin.set_fact:
        __journal_start_time: "{{ ansible_facts['date_time']['date'] ~ ' ' ~ ansible_facts['date_time']['time'] }}"
      when: __register_dev_log.stat.exists

    - name: Run linux-system-roles.crypto_policies
      include_tasks: tasks/run_role_with_clear_facts.yml

    # look for the exact module invocation, not some other message that might contain the string
    - name: Check system journal contains role fingerprints
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: >-
          set -eo pipefail;
          journalctl --since "{{ __journal_start_time }}" --no-pager |
          grep -v " Invoked with" | grep "sr_fingerprint.*begin system_role:crypto_policies" ||
          { echo ERROR: BEGIN fingerprint not found; exit 1; };
          journalctl --since "{{ __journal_start_time }}" --no-pager |
          grep -v " Invoked with" | grep "sr_fingerprint.*success system_role:crypto_policies" ||
          { echo ERROR: SUCCESS fingerprint not found; exit 1; }
      changed_when: false
      when: __register_dev_log.stat.exists

    - name: Verify the facts are correctly set
      block:
        - name: Flush handlers
          meta: flush_handlers

        - name: Check the current policy is DEFAULT and common variables
          assert:
            that:
              # assuming clean installation
              - crypto_policies_active == 'DEFAULT'
              - "'DEFAULT' in crypto_policies_available_policies"
              - "'FUTURE' in crypto_policies_available_policies"
              - "'LEGACY' in crypto_policies_available_policies"
              - "'AD-SUPPORT' in crypto_policies_available_modules"
              - "'AD-SUPPORT' in crypto_policies_available_subpolicies"
